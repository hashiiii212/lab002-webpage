<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Page Not Found | CS 224L</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e1a;--accent:#00d4ff;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;--border:#1e2d45;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .big{font-family:'Syne',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;opacity:.3;}
  h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-top:1rem;}
  p{color:var(--muted);font-size:.85rem;margin:0.75rem 0 2rem;}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;transition:opacity .2s;}
  .btn:hover{opacity:.85;}
</style>
</head>
<body>
<div>
  <div class="big">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="index.html" class="btn">← Back to Home</a>
</div>
</body>
</html>
